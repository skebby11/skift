# Turns a version tag (or a manual dry run) into a Skift.dmg.
# All the actual work lives in scripts/release.sh — this workflow just
# runs the test suite (a release must never skip tests), computes the
# version, calls the script, and publishes the result. See
# docs/release-pipeline.md for the design.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version to stamp (dry run only, e.g. 0.1.0-rc1)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: >
          xcodebuild -project Skift.xcodeproj -scheme Skift
          -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO build

      - name: Test
        run: >
          xcodebuild -project Skift.xcodeproj -scheme Skift
          -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO test

      - name: Compute version
        id: version
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "$DISPATCH_VERSION" ]; then
            VERSION="$DISPATCH_VERSION"
          else
            VERSION="0.0.0-ci"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build .dmg
        id: build_dmg
        run: |
          DMG_PATH=$(scripts/release.sh "${{ steps.version.outputs.version }}" | tail -1)
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      # REVIEW: enable real notarization once a paid Apple Developer ID
      # account exists and these secrets are populated — staple the ticket
      # to the .dmg with `xcrun notarytool submit --wait` + `xcrun stapler
      # staple` here. Until then this step only documents the gap; the
      # ad-hoc signature in scripts/release.sh is what ships.
      - name: Notarize (stub)
        if: ${{ env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_PASSWORD != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: echo "Notarization secrets present but notarization is not implemented yet — skipping."

      - name: Create draft GitHub Release
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          DMG_PATH: ${{ steps.build_dmg.outputs.dmg_path }}
        run: |
          gh release create "$TAG_NAME" \
            "$DMG_PATH" \
            --draft \
            --title "$TAG_NAME" \
            --generate-notes

      - name: Upload .dmg as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Skift-${{ steps.version.outputs.version }}
          path: ${{ steps.build_dmg.outputs.dmg_path }}
